# Rustfmt configuration for consistent code formatting (Stable channel only)
# Edition must match Cargo.toml
edition = "2021"

# Maximum line width
max_width = 100

# Use hard tabs instead of spaces
hard_tabs = false
tab_spaces = 4

# Use field initialization shorthand if possible
use_field_init_shorthand = true

# Force explicit discriminant values on enum variants
force_explicit_abi = true

# Remove nested parens
remove_nested_parens = true

# Reorder imports
reorder_imports = true

# Reorder modules
reorder_modules = true

# Use try shorthand
use_try_shorthand = true

# Match block trailing comma
match_block_trailing_comma = true

# Newline style
newline_style = "Unix"

# Merge derives
merge_derives = true

# Use small heuristics
use_small_heuristics = "Default"
